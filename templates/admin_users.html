{% extends "layout.html" %}

{% block content %}
<div class="space-y-6">
<div class="flex flex-wrap items-center justify-between gap-4">
<div>
<p class="text-sm uppercase tracking-[0.25em] text-slate-500">Authorization</p>
<h1 class="mt-2 text-3xl font-bold">Admin Panel User</h1>
</div>
</div>

<section class="rounded-3xl bg-white p-6 shadow">
<h2 class="text-xl font-bold text-slate-900">Buat Akun Kitchen/Admin/User</h2>
<form method="POST" class="mt-6 grid gap-4 md:grid-cols-2 xl:grid-cols-3">
<div>
<label class="mb-2 block text-sm font-semibold text-slate-700">Nama Lengkap</label>
<input type="text" name="full_name" class="w-full rounded-2xl border border-slate-300 px-4 py-3" required>
</div>
<div>
<label class="mb-2 block text-sm font-semibold text-slate-700">Username</label>
<input type="text" name="username" class="w-full rounded-2xl border border-slate-300 px-4 py-3" required>
</div>
<div>
<label class="mb-2 block text-sm font-semibold text-slate-700">Email</label>
<input type="email" name="email" class="w-full rounded-2xl border border-slate-300 px-4 py-3" required>
</div>
<div>
<label class="mb-2 block text-sm font-semibold text-slate-700">Role</label>
<select name="role" class="w-full rounded-2xl border border-slate-300 px-4 py-3">
<option value="user">user</option>
<option value="kitchen">kitchen</option>
<option value="admin">admin</option>
</select>
</div>
<div>
<label class="mb-2 block text-sm font-semibold text-slate-700">Password</label>
<input type="password" name="password" class="w-full rounded-2xl border border-slate-300 px-4 py-3" required>
</div>
<div>
<label class="mb-2 block text-sm font-semibold text-slate-700">Konfirmasi Password</label>
<input type="password" name="confirm_password" class="w-full rounded-2xl border border-slate-300 px-4 py-3" required>
</div>
<div class="md:col-span-2 xl:col-span-3 flex items-center justify-between gap-4">
<label class="inline-flex items-center gap-2 text-sm font-semibold text-slate-700">
<input type="checkbox" name="is_active" value="1" checked>
<span>Aktif</span>
</label>
<button class="rounded-2xl bg-slate-950 px-5 py-3 font-semibold text-white transition hover:bg-slate-800">
Simpan User
</button>
</div>
</form>
</section>

<section class="rounded-3xl bg-white p-6 shadow">
<h2 class="text-xl font-bold text-slate-900">Daftar User</h2>
<div class="mt-6 space-y-5">
{% for user in users %}
<form method="POST" action="{{ url_for('admin_update_user', user_id=user.id) }}" class="rounded-3xl border border-slate-200 p-5">
<div class="mb-4 flex flex-wrap items-center justify-between gap-3">
<div>
<h3 class="text-lg font-bold text-slate-900">{{ user.full_name }}</h3>
<p class="text-sm text-slate-500">ID {{ user.id }} • dibuat {{ user.created_at }}</p>
</div>
<div class="rounded-full px-3 py-1 text-xs font-bold {% if user.is_active %}bg-emerald-100 text-emerald-700{% else %}bg-slate-200 text-slate-600{% endif %}">
{{ "AKTIF" if user.is_active else "NONAKTIF" }}
</div>
</div>

<div class="grid gap-4 md:grid-cols-2 xl:grid-cols-3">
<div>
<label class="mb-2 block text-sm font-semibold text-slate-700">Nama Lengkap</label>
<input type="text" name="full_name" value="{{ user.full_name }}" class="w-full rounded-2xl border border-slate-300 px-4 py-3" required>
</div>
<div>
<label class="mb-2 block text-sm font-semibold text-slate-700">Username</label>
<input type="text" name="username" value="{{ user.username }}" class="w-full rounded-2xl border border-slate-300 px-4 py-3" required>
</div>
<div>
<label class="mb-2 block text-sm font-semibold text-slate-700">Email</label>
<input type="email" name="email" value="{{ user.email or '' }}" class="w-full rounded-2xl border border-slate-300 px-4 py-3" required>
</div>
<div>
<label class="mb-2 block text-sm font-semibold text-slate-700">Role</label>
<select name="role" class="w-full rounded-2xl border border-slate-300 px-4 py-3">
<option value="user" {% if user.role == "user" %}selected{% endif %}>user</option>
<option value="kitchen" {% if user.role == "kitchen" %}selected{% endif %}>kitchen</option>
<option value="admin" {% if user.role == "admin" %}selected{% endif %}>admin</option>
</select>
</div>
<div>
<label class="mb-2 block text-sm font-semibold text-slate-700">Password Baru</label>
<input type="password" name="new_password" placeholder="Kosongkan jika tidak diubah" class="w-full rounded-2xl border border-slate-300 px-4 py-3">
</div>
<div class="flex items-end">
<label class="inline-flex items-center gap-2 text-sm font-semibold text-slate-700">
<input type="checkbox" name="is_active" value="1" {% if user.is_active %}checked{% endif %}>
<span>User aktif</span>
</label>
</div>
</div>

<div class="mt-4 flex justify-end">
<button class="rounded-2xl bg-blue-600 px-5 py-3 font-semibold text-white transition hover:bg-blue-500">
Update User
</button>
</div>
</form>
{% endfor %}
</div>
</section>
</div>
{% endblock %}
