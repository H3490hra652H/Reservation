{% extends "layout.html" %}

{% block content %}
<div class="space-y-6">
<div>
<p class="text-sm uppercase tracking-[0.25em] text-slate-500">Account</p>
<h1 class="mt-2 text-3xl font-bold">Profile Saya</h1>
</div>

<div class="grid gap-6 xl:grid-cols-2">
<section class="rounded-3xl bg-white p-6 shadow">
<h2 class="text-xl font-bold text-slate-900">Informasi Profile</h2>
<p class="mt-2 text-sm text-slate-500">Anda hanya bisa mengubah profile akun sendiri.</p>

<form method="POST" class="mt-6 space-y-4">
<input type="hidden" name="action" value="profile">

<div>
<label class="mb-2 block text-sm font-semibold text-slate-700">Nama Lengkap</label>
<input type="text" name="full_name" value="{{ current_user.full_name }}" class="w-full rounded-2xl border border-slate-300 px-4 py-3" required>
</div>

<div>
<label class="mb-2 block text-sm font-semibold text-slate-700">Username</label>
<input type="text" value="{{ current_user.username }}" class="w-full rounded-2xl border border-slate-200 bg-slate-100 px-4 py-3 text-slate-500" readonly>
</div>

<div>
<label class="mb-2 block text-sm font-semibold text-slate-700">Email</label>
<input type="email" name="email" value="{{ current_user.email or '' }}" class="w-full rounded-2xl border border-slate-300 px-4 py-3" required>
</div>

<div>
<label class="mb-2 block text-sm font-semibold text-slate-700">Role</label>
<input type="text" value="{{ current_user.role }}" class="w-full rounded-2xl border border-slate-200 bg-slate-100 px-4 py-3 text-slate-500" readonly>
</div>

<button class="rounded-2xl bg-slate-950 px-5 py-3 font-semibold text-white transition hover:bg-slate-800">
Simpan Profile
</button>
</form>
</section>

<section class="rounded-3xl bg-white p-6 shadow">
<h2 class="text-xl font-bold text-slate-900">Ubah Password</h2>
<p class="mt-2 text-sm text-slate-500">Password baru minimal 8 karakter.</p>

<form method="POST" class="mt-6 space-y-4">
<input type="hidden" name="action" value="password">

<div>
<label class="mb-2 block text-sm font-semibold text-slate-700">Password Saat Ini</label>
<input type="password" name="current_password" class="w-full rounded-2xl border border-slate-300 px-4 py-3" required>
</div>

<div>
<label class="mb-2 block text-sm font-semibold text-slate-700">Password Baru</label>
<input type="password" name="new_password" class="w-full rounded-2xl border border-slate-300 px-4 py-3" required>
</div>

<div>
<label class="mb-2 block text-sm font-semibold text-slate-700">Konfirmasi Password Baru</label>
<input type="password" name="confirm_password" class="w-full rounded-2xl border border-slate-300 px-4 py-3" required>
</div>

<button class="rounded-2xl bg-blue-600 px-5 py-3 font-semibold text-white transition hover:bg-blue-500">
Ubah Password
</button>
</form>
</section>
</div>
</div>
{% endblock %}
