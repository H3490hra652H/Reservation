<!DOCTYPE html>
<html>
<head>
<title>Register - Manna Bakery and Cafe</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen text-white" style="background:
radial-gradient(circle at top left, rgba(14,165,233,0.22), transparent 28%),
radial-gradient(circle at bottom right, rgba(251,191,36,0.16), transparent 32%),
linear-gradient(135deg, #020617 0%, #08152c 48%, #0f172a 100%);">
<div class="mx-auto flex min-h-screen max-w-7xl items-center px-6 py-10">
<div class="mx-auto w-full max-w-xl rounded-[2rem] border border-white/10 bg-slate-950/70 p-8 shadow-2xl backdrop-blur">
<p class="text-sm uppercase tracking-[0.3em] text-slate-400">Public Register</p>
<h1 class="mt-3 text-4xl font-bold text-white">Buat akun user</h1>
<p class="mt-3 text-sm text-slate-400">Registrasi publik selalu dibuat dengan role <strong>user</strong>.</p>

{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}
<div class="mt-6 space-y-2">
{% for category, message in messages %}
<div class="rounded-2xl border px-4 py-3 text-sm font-semibold {% if category == 'success' %}border-emerald-400/30 bg-emerald-500/10 text-emerald-200{% else %}border-rose-400/30 bg-rose-500/10 text-rose-200{% endif %}">
{{ message }}
</div>
{% endfor %}
</div>
{% endif %}
{% endwith %}

<form method="POST" class="mt-8 space-y-5">
<div>
<label class="mb-2 block text-sm font-semibold text-slate-300">Nama Lengkap</label>
<input type="text" name="full_name" class="w-full rounded-2xl border border-slate-700 bg-slate-900/90 px-4 py-3 text-white outline-none transition focus:border-cyan-400 focus:ring-2 focus:ring-cyan-400/20" required>
</div>

<div>
<label class="mb-2 block text-sm font-semibold text-slate-300">Username</label>
<input type="text" name="username" class="w-full rounded-2xl border border-slate-700 bg-slate-900/90 px-4 py-3 text-white outline-none transition focus:border-cyan-400 focus:ring-2 focus:ring-cyan-400/20" required>
</div>

<div>
<label class="mb-2 block text-sm font-semibold text-slate-300">Email</label>
<input type="email" name="email" class="w-full rounded-2xl border border-slate-700 bg-slate-900/90 px-4 py-3 text-white outline-none transition focus:border-cyan-400 focus:ring-2 focus:ring-cyan-400/20" required>
</div>

<div>
<label class="mb-2 block text-sm font-semibold text-slate-300">Password</label>
<input type="password" name="password" class="w-full rounded-2xl border border-slate-700 bg-slate-900/90 px-4 py-3 text-white outline-none transition focus:border-cyan-400 focus:ring-2 focus:ring-cyan-400/20" required>
</div>

<div>
<label class="mb-2 block text-sm font-semibold text-slate-300">Konfirmasi Password</label>
<input type="password" name="confirm_password" class="w-full rounded-2xl border border-slate-700 bg-slate-900/90 px-4 py-3 text-white outline-none transition focus:border-cyan-400 focus:ring-2 focus:ring-cyan-400/20" required>
</div>

<button class="w-full rounded-2xl bg-gradient-to-r from-cyan-500 via-blue-500 to-indigo-500 px-4 py-3 text-base font-bold text-white shadow-lg shadow-cyan-900/30 transition hover:scale-[1.01]">
Daftar
</button>
</form>

<div class="mt-6 grid gap-3 sm:grid-cols-2">
<a href="{{ url_for('login') }}" class="inline-flex items-center justify-center rounded-2xl border border-white/10 bg-white/5 px-4 py-3 text-sm font-semibold text-slate-200 transition hover:bg-white/10">
Sudah punya akun
</a>
<a href="{{ url_for('restaurant_landing') }}" class="inline-flex items-center justify-center rounded-2xl border border-white/10 bg-white/5 px-4 py-3 text-sm font-semibold text-slate-200 transition hover:bg-white/10">
Halaman Restoran
</a>
</div>
</div>
</div>
</body>
</html>
